<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Music Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.1.3/socket.io.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<style>
    #myProgress {
  width: 100%;
  background-color: grey;
}
    #myBar {
  width: 10%;
  height: 30px;
  background-color: #04AA6D;
  text-align: center; /* To center it horizontally (if you want) */
  line-height: 30px; /* To center it vertically */
  color: white;
}
</style>
<body>
    <h1>Music Player</h1>
    
    
    <!-- Volume Control -->
    <button id="volumeUpBtn">Volume Up</button>
    <button id="volumeDownBtn">Volume Down</button>
    
    <div>
        <h1>Live Search</h1>
        <input type="text" id="searchInput" placeholder="Search...">
        <div id="searchResults"></div>
    </div>
    <div>
        <h2>Current Song</h2>
        <ul id="currentsong"></ul>
    </div>
    <div id="myProgress">
        <div id="myBar"></div>
      </div>
    <div>
        <h2>Playlist</h2>
        <ul id="playlist"></ul>
    </div>

    <script>
        const serverUrl = window.location.origin;

        const socket = io.connect(serverUrl);  // Change the URL to match your server

        // Volume Control
        document.getElementById('volumeUpBtn').addEventListener('click', () => {
            socket.emit('volume', {'volume': 'up'});
        });

        document.getElementById('volumeDownBtn').addEventListener('click', () => {
            socket.emit('volume', {'volume': 'down'});
        });
        //check search field
        $('#searchInput').on('input', function () {
        const searchValue = $(this).val();
    
        // Emit the search event to the server
        socket.emit('search', { 'search': searchValue });
        });

        socket.on('searchresult', function (results) {
            console.log('Received search results:', results);
            const $searchResults = $('#searchResults');
            $searchResults.empty();

            if (results.length === 0) {
                $searchResults.append('<p>No results found.</p>');
            } else {
                results.forEach(function (result) {
                    const $resultDiv = $('<div class="search-result"></div>');
                    $resultDiv.append(`<p><span class="song-name">${result.name}</span></p>`);
            
                    // Create an "Add" button with data-song-id attribute
                    const $addButton = $('<button class="add-button">Add</button>');
                    $addButton.attr('data-song-id', result.id);
                    $resultDiv.append($addButton);
            
                    // Append the result to the searchResults div
                    $searchResults.append($resultDiv);
                });
            }
        });

        $('#searchResults').on('click', '.add-button', function () {
            const songId = $(this).data('song-id');
    
            // Emit the add_song event with the songId
            socket.emit('add_to_playlist', { 'songId': songId });
        });

        // Update current song
        socket.on('currentsong', (currentsong) => {
            const currentsongElement = document.getElementById('currentsong');
            currentsongElement.innerHTML = '';

            if (currentsong) {
                const listItem = document.createElement('li');
                listItem.textContent = currentsong.name;  // Replace with actual song details
                currentsongElement.appendChild(listItem);
            } else {
                const listItem = document.createElement('li');
                listItem.textContent = 'No song playing';  // Replace with actual song details
                currentsongElement.appendChild(listItem);
            }
        });
        socket.on('currenttime', (currenttime) => {
            const progressBar = document.getElementById('myBar');
            progressBar.style.width = currenttime + '%';
            progressBar.innerHTML = currenttime + '%';
            // const progressBar = document.getElementById('myBar');
            // const newProgress = currenttime;
            // currentProgress = 0

            // if (typeof newProgress === 'number' && newProgress >= 0 && newProgress <= 100) {
            //     cancelAnimationFrame(animationFrameId);

            //     const updateProgressBar = () => {
            //         if (currentProgress < newProgress) {
            //             currentProgress += 1;
            //             progressBar.style.width = currentProgress + '%';
            //             progressBar.innerHTML = currentProgress + '%';
            //             animationFrameId = requestAnimationFrame(updateProgressBar);
            //         }
            //     };

            //     updateProgressBar();
            // }
        });
        

        // Update Playlist
        socket.on('Queue', (playlist) => {
            const playlistElement = document.getElementById('playlist');
            playlistElement.innerHTML = '';

            for (const song of playlist) {
                const listItem = document.createElement('li');
                listItem.textContent = song.name;  // Replace with actual song details
                playlistElement.appendChild(listItem);
            }
        });
    </script>
</body>
</html>
