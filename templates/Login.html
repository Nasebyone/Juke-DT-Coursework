<!DOCTYPE html>
<html data-bs-theme="dark" lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Login</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='assets/bootstrap/css/bootstrap.min.css') }}">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/bs-theme-overrides.css') }}">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/animate.min.css') }}">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/-Login-form-Page-BS4--Login-form-Page-BS4.css') }}">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/Banner-Heading-Image-images.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/Growing-Search-Bar-Animated-Text-Input.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/Navbar-Right-Links-Dark-icons.css') }}">
</head>

<body>
    <div class="container-fluid">
        <div class="row mh-100vh">
            <div class="col-10 col-sm-8 col-md-6 col-lg-6 offset-1 offset-sm-2 offset-md-3 offset-lg-0 align-self-center d-lg-flex align-items-lg-center align-self-lg-stretch p-5 rounded rounded-lg-0 my-5 my-lg-0" id="login-block">

                <div class="m-auto w-lg-75 w-xl-50">
                                        {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                        {% if category == 'error' %}
                        <div class="alert alert-danger alter-dismissable fade show d-flex justify-content-between" role="alert">
                            {{message}}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        {% else %}
                        <div class="alert alert-success alter dismissable fade show d-flex justify-content-between" role="alert">
                            {{message}}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        {% endif %}
                        {% endfor %}
                    {% endif %}
                    {% endwith %}
                    <h2 class="text-primary text-primary fw-light mb-5"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" fill="currentColor" viewBox="0 0 16 16" class="bi bi-person-badge">
                            <path d="M6.5 2a.5.5 0 0 0 0 1h3a.5.5 0 0 0 0-1h-3zM11 8a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"></path>
                            <path d="M4.5 0A2.5 2.5 0 0 0 2 2.5V14a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V2.5A2.5 2.5 0 0 0 11.5 0h-7zM3 2.5A1.5 1.5 0 0 1 4.5 1h7A1.5 1.5 0 0 1 13 2.5v10.795a4.2 4.2 0 0 0-.776-.492C11.392 12.387 10.063 12 8 12s-3.392.387-4.224.803a4.2 4.2 0 0 0-.776.492V2.5z"></path>
                        </svg>&nbsp;Login</h2>
                    <form method="POST"> 
                        <div class="form-group mb-3"><label class="form-label text-secondary">Email</label><input class="form-control" type="text" required="" inputmode="email" name="email" id="email"></div>
                        <div class="form-group mb-3"><label class="form-label text-secondary">Password</label><input class="form-control" type="password" required="" name="password1" id="password1"></div>
                        <div class="col d-flex justify-content-between">
                            <button class="btn btn-primary mt-2" data-bss-hover-animate="pulse" type="submit">Submit</button>
                            <button class="btn btn-outline-primary mt-2" data-bss-hover-animate="pulse" type="button" onclick="location.href='/register'">Register</button>
                        </div>
                    </form>
                    <p class="mt-3 mb-0"><a class="text-secondary small" href="#">Forgot your email or password?</a></p>
                </div>
            </div>
            <div class="col-lg-6 d-flex align-items-end" id="bg-block" style="background-image: url(&quot;{{ url_for('static', filename='img/background.webp') }}&quot;);background-size: cover;background-position: center center;">
                <p class="ms-auto small text-dark mb-2"><em>Photo by&nbsp; Henry</em></p>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='bootstrap/js/bootstrap.min.js') }}"></script>
    
    <script src="{{ url_for('static', filename='js/bs-init.js') }}"></script>
</body>

</html>
